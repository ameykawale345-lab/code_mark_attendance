<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartAttend</title>
  <style>
    body{font-family:Arial;margin:0}
    nav{display:flex;justify-content:space-between;padding:15px;background:#111;color:#fff}
    nav a{color:#fff;margin-left:15px;cursor:pointer}
    section{padding:40px}

    /* AUTH MODAL */
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center}
    .modal-content{background:#fff;padding:25px;border-radius:10px;width:300px}
    input,select,button{width:100%;margin:8px 0;padding:8px}
    .close{float:right;cursor:pointer}
  </style>
</head>
<body>

<!-- NAVBAR (UPDATED) -->
<nav>
  <div>SmartAttend</div>
  <div>
    <a onclick="openModal('login')">Login</a>
    <a onclick="openModal('register')">Register</a>
  </div>
</nav>

<!-- YOUR ORIGINAL CONTENT (KEEP YOUR BIG UI HERE) -->
<section>
  <h1>Smart Attendance System</h1>
  <p>Your existing UI remains unchanged 👍</p>
</section>

<!-- AUTH MODAL -->
<div class="modal" id="authModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✖</span>

    <!-- REGISTER -->
    <div id="registerBox">
      <h3>Register</h3>
      <input id="r_name" placeholder="Name">
      <input id="r_phone" placeholder="Phone">
      <input id="r_pass" type="password" placeholder="Password">
      <select id="r_type">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>
      <button onclick="register()">Register</button>
    </div>

    <!-- LOGIN -->
    <div id="loginBox" style="display:none">
      <h3>Login</h3>
      <input id="l_phone" placeholder="Phone">
      <input id="l_pass" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
    </div>

    <!-- OTP -->
    <div id="otpBox" style="display:none">
      <h3>Enter OTP</h3>
      <input id="otp_phone" placeholder="Phone">
      <input id="otp_val" placeholder="OTP">
      <button onclick="verify()">Verify</button>
    </div>

  </div>
</div>

<script>
function openModal(type){
  document.getElementById('authModal').style.display='flex'
  document.getElementById('registerBox').style.display = type==='register'?'block':'none'
  document.getElementById('loginBox').style.display = type==='login'?'block':'none'
  document.getElementById('otpBox').style.display = 'none'
}

function closeModal(){
  document.getElementById('authModal').style.display='none'
}

async function register(){
  let res = await fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({name:r_name.value,phone:r_phone.value,password:r_pass.value,type:r_type.value})})
  alert((await res.json()).message)
  document.getElementById('otpBox').style.display='block'
}

async function login(){
  let res = await fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({phone:l_phone.value,password:l_pass.value})})
  alert((await res.json()).message)
  document.getElementById('otpBox').style.display='block'
}

async function verify(){
  let res = await fetch('/verify',{method:'POST',headers:{'Content-Type':'application/json'},
  body:JSON.stringify({phone:otp_phone.value,otp:otp_val.value})})
  alert((await res.json()).message)
}
</script>

</body>
</html>
